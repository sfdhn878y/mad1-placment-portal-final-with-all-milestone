<!DOCTYPE html>
<html>

<head>
    <title>Edit Job</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .container {
            width: 500px;
            margin: 80px auto;
            background: #020617;
            padding: 30px;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>Edit Job</h2>

    <form method="POST">

        <label>Job Title</label>
        <input type="text" name="title" value="{{ job.title }}">

        <label>Skills</label>
        <input type="text" name="skills" value="{{ job.skills }}">

        <label>Salary</label>
        <input type="text" name="salary" value="{{ job.salary }}">

        <button type="submit">Update Job</button>

    </form>

</div>

</body>
</html>
