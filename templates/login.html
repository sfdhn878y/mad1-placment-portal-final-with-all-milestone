{% extends "base.html" %}
{% block title %}Home{% endblock %}

{% block content %}

<style>
    .login-wrapper {
        min-height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(120deg, #020617, #0f172a);
        padding: 40px 20px;
    }

    .box {
        width: 360px;
        padding: 35px;
        background: rgba(255,255,255,0.05);
        border-radius: 12px;
        border: 1px solid #1e293b;
        backdrop-filter: blur(12px);
        box-shadow: 0 0 25px rgba(0,0,0,0.6);
        text-align: center;
        color: #e2e8f0;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    .box h2 {
        margin-bottom: 25px;
        color: #38bdf8;
    }

    .box input {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        background: #020617;
        border: 1px solid #1e293b;
        border-radius: 6px;
        color: white;
        font-size: 15px;
    }

    .box input:focus {
        outline: none;
        border-color: #38bdf8;
    }

    .box button {
        width: 100%;
        padding: 12px;
        margin-top: 25px;
        background: #38bdf8;
        border: none;
        border-radius: 6px;
        color: #020617;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .box button:hover {
        background: #0ea5e9;
        transform: scale(1.03);
    }

    .box a {
        color: #38bdf8;
        text-decoration: none;
    }

    .box p {
        margin-top: 20px;
        color: #94a3b8;
    }
</style>

<div class="login-wrapper">
    <div class="box">
        <h2>Login</h2>

        <form method="POST" action="/login">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p>
            New user? <a href="/register">Register</a>
        </p>
    </div>
</div>

{% endblock %}
